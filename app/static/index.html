<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    .sidebar-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1001;
      background: rgba(0, 180, 90, 0.7);
      border: 1px solid rgba(0, 255, 150, 0.6);
      color: #eafff2;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      padding: 14px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(1px);
      color: #c8facc;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      transition: transform 0.25s ease;
      z-index: 1000;
    }

    .sidebar.hidden {
      transform: translateX(100%);
    }

    .section {
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 10px;
    }

    .section:first-child {
      border-top: none;
      padding-top: 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.85;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .control-row.center {
      justify-content: center;
    }

    .control-column {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    .control-label {
      font-size: 11px;
      opacity: 0.85;
    }

    .control-value {
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
    }

    input[type="range"],
    input[type="checkbox"] {
      accent-color: #00d47a;
    }

    input,
    select,
    .duration-input {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 4px;
      padding: 4px 6px;
      color: #eafff2;
      font-size: 11px;
    }

    button {
      background: rgba(0, 180, 90, 0.6);
      border: 1px solid rgba(0, 255, 150, 0.6);
      color: #eafff2;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: rgba(0, 220, 120, 0.8);
    }

    .accordion {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .accordion-header {
      padding: 6px 8px;
      background: rgba(0,0,0,0.25);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .accordion-content {
      display: none;
      padding: 8px;
    }

    .accordion.open .accordion-content {
      display: block;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 10px;
      align-items: center;
    }

    .control-name {
      font-size: 11px;
      opacity: 0.85;
      white-space: nowrap;
    }

    .duration-row {
      display: flex;
      gap: 6px;
    }

    .duration-input {
      width: 54px;
    }

    .body-label {
      position: absolute;
      color: white;
      font-size: 11px;
      pointer-events: none;
      text-shadow: 1px 1px 1px black;
      z-index: 2000;
      transform: translate(-50%, -16px);
    }
  </style>
</head>

<body>
<button id="toggle-sidebar" class="sidebar-toggle">☰</button>

<div id="sidebar" class="sidebar">

  <div class="section">
    <div class="section-title">Player</div>

    <div class="control-row center">
      <button id="play">Play</button>
      <button id="pause">Pause</button>
    </div>

    <div class="control-column">
      <span class="control-label">Timeline</span>
      <input type="range" id="timeline" />
      <span id="time-label" class="control-value"></span>
      <span id="date-label" class="control-value"></span>
    </div>

    <div class="control-column">
      <span class="control-label">Speed</span>
      <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1" />
      <span id="speed-label" class="control-value"></span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Camera</div>
    <div class="control-row center">
      <button id="reset-camera">Reset view</button>
      <button id="fit-camera">Center & zoom</button>
    </div>
    <div class="control-column">
      <span class="control-label">Suivre</span>
      <select id="camera-target">
        <option value="-1">Libre</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Display</div>

    <div class="control-row">
      <span class="control-label">Grid</span>
      <input type="checkbox" id="toggle-grid" checked />
    </div>

    <div class="control-row">
      <span class="control-label">Axes</span>
      <input type="checkbox" id="toggle-axes" checked />
    </div>

    <div class="control-column">
      <span class="control-label">Grid size</span>
      <input type="range" id="grid-size" min="2" max="100" value="50" />
    </div>

    <div class="control-column">
      <span class="control-label">Grid divisions</span>
      <input type="range" id="grid-divisions" min="2" max="100" value="50" />
    </div>
  </div>

  <div class="section">
    <div class="section-title">Bodies</div>
    <div id="bodies-panel"></div>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.159.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "https://unpkg.com/three@0.159.0/examples/jsm/controls/OrbitControls.js";

/* UI */
const sidebar = document.getElementById("sidebar");
document.getElementById("toggle-sidebar").onclick = () => sidebar.classList.toggle("hidden");

/* DATA */
const REPLAY = window.REPLAY_DATA;
const totalFrames = REPLAY.positions.length;
const fps = 60;

/* BODY DISPLAY CONFIG */
const bodyDisplayConfig = REPLAY.body_configs
    ? REPLAY.body_configs.map((cfg, i) => ({
        id: i,
        name: cfg.name,
        label: cfg.name,
        color: cfg.color,
        size: cfg.size || 0.05,
        visible: true,
        showLabel: true,
        renderMode: "sphere",
        trajectory: { enabled: true, mode: "persistent", duration: 5.0 }
      }))
    : REPLAY.positions[0].map((_, i) => ({
        id: i,
        name: `Body ${i + 1}`,
        label: `Body ${i + 1}`,
        color: "#00d47a",
        size: 0.05,
        visible: true,
        showLabel: true,
        renderMode: "sphere",
        trajectory: { enabled: true, mode: "persistent", duration: 5.0 }
      }));

/* BODIES PANEL UI */
const bodiesPanel = document.getElementById("bodies-panel");

bodyDisplayConfig.forEach((cfg, i) => {
  const el = document.createElement("div");
  el.className = "accordion";

  el.innerHTML = `
    <div class="accordion-header">
      <span class="accordion-title">${cfg.name}</span>
      <span>▾</span>
    </div>

    <div class="accordion-content">
      <div class="control-grid">

        <div class="control-name">Show label</div>
        <input type="checkbox" data-body="${i}" data-field="showLabel" checked/>

        <div class="control-name">Label</div>
        <input type="text" value="${cfg.label}" data-body="${i}" data-field="label"/>

        <div class="control-name">Color</div>
        <input type="color" value="${cfg.color}" data-body="${i}" data-field="color"/>

        <div class="control-name">Render</div>
        <select data-body="${i}" data-field="renderMode">
          <option value="sphere">Sphere</option>
          <option value="point">Point</option>
        </select>

        <div class="control-name">Trajectory</div>
        <input type="checkbox" data-body="${i}" data-field="trajectory.enabled"/>

        <div class="control-name">Trail mode</div>
        <select data-body="${i}" data-field="trajectory.mode">
          <option value="persistent">Persistent</option>
          <option value="duration">Duration</option>
        </select>

        <div class="control-name">Trail (s)</div>
        <div class="duration-row">
          <input type="number" class="duration-input"
            value="${cfg.trajectory.duration}"
            data-body="${i}" data-field="trajectory.duration"/>
        </div>

      </div>
    </div>
  `;

  bodiesPanel.appendChild(el);
});

document.querySelectorAll(".accordion-header").forEach(h =>
  h.onclick = () => h.parentElement.classList.toggle("open")
);

/* INPUT DISPATCHER */
document.addEventListener("input", (e) => {
  const i = e.target.dataset.body;
  const field = e.target.dataset.field;
  if (i === undefined || !field) return;

  const cfg = bodyDisplayConfig[i];

  if (field === "label") {
    const text = e.target.value;
    cfg.labelElement.textContent = text || `Body ${+i + 1}`;
    e.target.closest(".accordion").querySelector(".accordion-title").textContent = text || `Body ${+i + 1}`;
  }

  const path = field.split(".");
  let obj = cfg;
  for (let j = 0; j < path.length - 1; j++) obj = obj[path[j]];
  obj[path.at(-1)] =
    e.target.type === "checkbox" ? e.target.checked :
    e.target.type === "number" ? Number(e.target.value) :
    e.target.value;
});

/* THREE.JS SETUP */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(3, 3, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
const W = document.documentElement.clientWidth || 800;
const H = document.documentElement.clientHeight || 900;
renderer.setSize(W, H);
camera.aspect = W / H;
camera.updateProjectionMatrix();
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* HELPERS */
const axesHelper = new THREE.AxesHelper(1.5);
scene.add(axesHelper);
document.getElementById("toggle-axes").onchange =
  e => axesHelper.visible = e.target.checked;

/* GRID */
let gridHelper = null;

function createGrid(size, div) {
  if (gridHelper) scene.remove(gridHelper);
  gridHelper = new THREE.GridHelper(size, div);
  gridHelper.material.opacity = 0.5;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);
}

const gridSize = document.getElementById("grid-size");
const gridDivs = document.getElementById("grid-divisions");
createGrid(+gridSize.value, +gridDivs.value);

gridSize.oninput = gridDivs.oninput =
  () => createGrid(+gridSize.value, +gridDivs.value);

document.getElementById("toggle-grid").onchange =
  e => gridHelper.visible = e.target.checked;

/* BODIES + TRAJECTORIES */
const bodies = [];
const bodiesTrajectories = [];
const trajectoryGeoms = [];

const geom = new THREE.SphereGeometry(0.05, 16, 16);

REPLAY.positions[0].forEach((_, i) => {
  const cfg = bodyDisplayConfig[i];
  const color = new THREE.Color(cfg.color);

  // 1) SPHERE — taille selon body_configs
  const size = cfg.size || 0.05;
  const geom = new THREE.SphereGeometry(size, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color });
  const mesh = new THREE.Mesh(geom, mat);
  scene.add(mesh);
  bodies.push(mesh);

  // 2) TRAJECTORY LINE
  const pos = new Float32Array(totalFrames * 3);
  pos.fill(0);
  const trajGeom = new THREE.BufferGeometry();
  trajGeom.setAttribute("position", new THREE.BufferAttribute(pos, 3));

  const lineMat = REPLAY.body_configs
    ? new THREE.LineDashedMaterial({ color, dashSize: 0.05, gapSize: 0.03 })
    : new THREE.LineBasicMaterial({ color });
  const line = new THREE.Line(trajGeom, lineMat);
  scene.add(line);

  bodiesTrajectories.push(line);
  trajectoryGeoms.push(trajGeom);

  // 3) 2D LABEL (DOM)
  const labelEl = document.createElement("div");
  labelEl.className = "body-label";
  labelEl.style.display = cfg.showLabel ? "block" : "none";
  labelEl.textContent = cfg.label || `Body ${i + 1}`;
  document.body.appendChild(labelEl);

  cfg.labelElement = labelEl;
});
// TRAJECTOIRE DE RÉFÉRENCE (points Horizons)
if (REPLAY.reference_trajectory) {
    const refGeom = new THREE.BufferGeometry();
    const refPositions = new Float32Array(REPLAY.reference_trajectory.flat());
    refGeom.setAttribute('position', new THREE.BufferAttribute(refPositions, 3));

    const refMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.03,
        transparent: true,
        opacity: 0.5,
    });

    const refPoints = new THREE.Points(refGeom, refMat);
    scene.add(refPoints);
}
/* CAMERA TARGET */  // 
const cameraTargetSelect = document.getElementById("camera-target");
let cameraTargetIndex = -1;

bodyDisplayConfig.forEach((cfg, i) => {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = cfg.name;
  cameraTargetSelect.appendChild(option);
});

if (REPLAY.body_configs) {
  cameraTargetIndex = bodyDisplayConfig.length - 1;  // sonde par défaut
  cameraTargetSelect.value = cameraTargetIndex;
}

cameraTargetSelect.onchange = e => {
  cameraTargetIndex = +e.target.value;
  if (cameraTargetIndex === -1) controls.target.set(0, 0, 0);
};
/* PLAYER */
let frame = 0, frameFloat = 0, timeFloat = 0, speed = 1, playing = false;

const timeline = document.getElementById("timeline");
timeline.max = totalFrames - 1;

document.getElementById("play").onclick = () => {
    if (frame === totalFrames - 1) timeFloat = 0;  // repart du début si fini
    playing = true;
}
document.getElementById("pause").onclick = () => playing = false;

timeline.oninput = () => {
    frame = +timeline.value;
    timeFloat = REPLAY.times ? REPLAY.times[frame] : frame / fps;
    updateFrame(frame);
};

document.getElementById("speed-slider").oninput = e => {
  speed = +e.target.value;
  document.getElementById("speed-label").textContent = `×${speed.toFixed(1)}`;
};

/* TRAJECTORY HELPER */
function updateTrajectory(i, f, cfg) {
  const pos = trajectoryGeoms[i].attributes.position.array;
  const line = bodiesTrajectories[i];
  const lineMat = line.material;

  // appliquer la couleur de la config
  if (lineMat.color.getStyle() !== cfg.color) {
    lineMat.color.set(cfg.color);
  }

  if (!cfg.trajectory.enabled) {
    line.visible = false;
    return;
  }

  let nFrames = 0;
  const maxFrames = Math.min(f + 1, totalFrames);

  // MODE :
  if (cfg.trajectory.mode === "persistent") {
    // trajectoire complète depuis le début
    nFrames = maxFrames;
  } else {
    // dernier intervalle de temps (duration en secondes)
    const durationFrames = Math.floor(cfg.trajectory.duration * fps);
    nFrames = Math.min(maxFrames, durationFrames);
  }

  const offset = Math.max(0, maxFrames - nFrames);

  for (let ff = 0; ff < nFrames; ff++) {
    const absFrame = offset + ff;
    const j = ff * 3;
    const [x, y, z] = REPLAY.positions[absFrame][i];
    pos[j]     = x;
    pos[j + 1] = y;
    pos[j + 2] = z;
  }

  trajectoryGeoms[i].attributes.position.needsUpdate = true;
  if (REPLAY.body_configs) line.computeLineDistances();
  line.visible = true;
}

/* UPDATE FRAME */
function updateFrame(f) {
  // 1) Mise à jour des corps (sphères + labels)
  bodies.forEach((b, i) => {
    const cfg = bodyDisplayConfig[i];
    const [x, y, z] = REPLAY.positions[f][i];
    b.position.set(x, y, z);

    // appliquer la couleur à la sphère
    if (b.material.color.getStyle() !== cfg.color) {
      b.material.color.set(cfg.color);
    }

    // mettre à jour le label 2D
    const labelEl = cfg.labelElement;
    if (labelEl) {
      labelEl.style.display = cfg.showLabel ? "block" : "none";
      if (cfg.showLabel) {
        const v = b.position.clone();
        v.project(camera);
        const xPx = (v.x + 1) * W / 2;
        const yPx = (1 - v.y) * H / 2;
        labelEl.style.left = `${xPx}px`;
        labelEl.style.top  = `${yPx}px`;
      }
    }
  });


  bodiesTrajectories.forEach((_, i) => {
    const cfg = bodyDisplayConfig[i];
    updateTrajectory(i, f, cfg);
  });

  const t = REPLAY.times ? REPLAY.times[f] : f * (1/60);
  const years = Math.floor(t);
  const days = Math.floor((t - years) * 365.25);

  document.getElementById("time-label").textContent = `Frame ${f} / ${totalFrames - 1}`;
  document.getElementById("date-label").textContent = `t = ${years} ans ${days} j`;
}
  /* CAMERA BUTTONS */
  document.getElementById("reset-camera").onclick = () => {
    cameraTargetIndex = -1;
    cameraTargetSelect.value = -1;
    camera.position.set(3, 3, 3);
    controls.target.set(0, 0, 0);
  };

  document.getElementById("fit-camera").onclick = () => {
    if (cameraTargetIndex >= 0 && REPLAY.positions[frame]) {
      const [x, y, z] = REPLAY.positions[frame][cameraTargetIndex];
      camera.position.set(x + 2, y + 2, z + 2);
    } else {
      camera.position.set(2, 2, 2);
      controls.target.set(0, 0, 0);
    }
  };

  /* LOOP */
function animate() {
  requestAnimationFrame(animate);

  if (playing) {
    const totalTime = REPLAY.times[totalFrames - 1];
    timeFloat += speed * totalTime * 0.0005;

    frame = REPLAY.times.findIndex(t => t >= timeFloat);
    if (frame === -1) {
      frame = totalFrames - 1;
      timeFloat = 0;
      playing = false;
    }

    timeline.value = frame;
    updateFrame(frame);
  }

  // Suivre le corps sélectionné
  if (cameraTargetIndex >= 0 && REPLAY.positions[frame]) {
    const [x, y, z] = REPLAY.positions[frame][cameraTargetIndex];
    controls.target.set(x, y, z);
  }

  controls.update();
  renderer.render(scene, camera);
}
  animate();
</script>
</body>
</html>
